<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoultryVision AI | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <div class="hero-side">
      <div class="brand-pill"><span class="badge-dot"></span><span>Create lightweight account</span></div>
      <h1 class="display-6 fw-bold mb-3">Quick registration</h1>
      <p class="text-white-50">System inatumia local JSON-style storage kwa browser ili ibaki nyepesi na rahisi ku-run bila backend.</p>
    </div>
    <div class="auth-card">
      <h2 class="fw-bold mb-2">Create account</h2>
      <p class="small-note mb-4">Akaunti mpya default role yake ni viewer. Admin anaweza kubadili role baadaye.</p>
      <form id="registerForm">
        <div class="mb-3"><label class="form-label">Full name</label><input class="form-control" id="fullName" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input class="form-control" id="email" type="email" required></div>
        <div class="mb-3"><label class="form-label">Username</label><input class="form-control" id="username" required></div>
        <div class="mb-4"><label class="form-label">Password</label><input class="form-control" id="password" type="password" required></div>
        <button class="btn btn-primary w-100 rounded-pill">Create account</button>
      </form>
      <div class="text-center mt-4"><a href="index.html" class="fw-semibold text-decoration-none">Back to login</a></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/seed-data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    bootstrapData();
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const res = registerUser({
        fullName: fullName.value.trim(),
        email: email.value.trim(),
        username: username.value.trim(),
        password: password.value.trim(),
        role: 'viewer'
      });
      if (!res.ok) return Swal.fire({ icon: 'error', title: 'Registration failed', text: res.message });
      Swal.fire({ icon: 'success', title: 'Account created', text: 'Sasa unaweza ku-login.' }).then(() => location.href = 'index.html');
    });
  </script>
</body>
</html>
